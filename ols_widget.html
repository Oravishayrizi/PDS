<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
    background: transparent;
    padding: 0;
    margin: 0;
    height: 100vh;
    overflow: hidden;
  }
  .wrapper {
    display: flex;
    gap: 14px;
    height: 100vh;
    overflow: hidden;
  }
  .chart-area {
    flex: 1;
    min-width: 0;
    min-height: 0;
  }
  canvas { 
    display: block; 
    border-radius: 4px; 
  }
  
  .panel {
    width: 320px;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    justify-content: center;
    max-height: 100%;
    overflow: hidden;
  }
  
  .slider-group {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 8px 18px;
  }
  .slider-group label {
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
  }
  .slider-group .val {
    color: #0063a7;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
  }
  .slider-group input[type="range"] {
    width: 100%;
    accent-color: #0063a7;
    height: 24px;
  }
  
  .stat {
    border-radius: 8px;
    padding: 6px 18px;
    text-align: center;
  }
  .stat .sl { font-size: 15px; color: #666; display: block; margin-bottom: 1px; }
  .stat .sv { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-yours { background: #fff3e0; }
  .stat-yours .sv { color: #941b22; }
  .stat-me { background: #e3f2fd; }
  .stat-me .sv { color: #b35900; }
  .stat-ols { background: #e8f5e9; }
  .stat-ols .sv { color: #2e7d32; }
  
  .btn {
    padding: 10px 18px;
    border: 2px solid #0063a7;
    background: #fff;
    color: #0063a7;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 700;
    transition: all 0.15s;
    text-align: center;
  }
  .btn:hover { background: #0063a7; color: #fff; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="chart-area">
    <canvas id="canvas"></canvas>
  </div>
  <div class="panel">
    <div class="slider-group">
      <label>Slope β̂₁ <span class="val" id="slopeVal">0.050</span></label>
      <input type="range" id="slopeSlider" min="-0.02" max="0.15" step="any" value="0.05">
    </div>
    <div class="slider-group">
      <label>Intercept β̂₀ <span class="val" id="interceptVal">7.0</span></label>
      <input type="range" id="interceptSlider" min="-5" max="20" step="any" value="7">
    </div>
    <div class="stat stat-yours">
      <span class="sl">Current Mean Squared Error</span>
      <span class="sv" id="rssVal">—</span>
    </div>
    <div class="stat stat-me">
      <span class="sl">Mean Error (bias)</span>
      <span class="sv" id="meVal">—</span>
    </div>
    <div class="stat stat-ols">
      <span class="sl">OLS Mean Squared Error</span>
      <span class="sv" id="olsRssVal">—</span>
    </div>
    <button class="btn" id="showOLS">Show OLS Solution</button>
  </div>
</div>
<script>
// 25 points generated from Advertising regression: y = 7.03 + 0.0475·TV + noise
const rawX = [296.67,119.32,34.71,20.92,73.12,237.6,102.02,291.62,49.76,137.73,51.52,69.44,231.84,28.89,136.03,25.41,168.2,2.61,295.72,94.98,191.83,88.57,299.01,271.81,296.62,19.69,188.11,147.14,291.31,108.67,204,79.12,55.71,55.54,113.79,254.11,149.42,237.18,251.54,137.07]
const rawY = [22.51,13.99,11.25,5.22,12.98,18.45,13.27,21.77,7.37,12.88,7.69,11.7,18.03,8.21,12.52,7.09,16.85,4.94,20.5,12.08,18.39,9.75,20.36,17.05,20.04,7.15,18.48,15.05,20.78,13.94,15.99,10.69,10.35,13.02,13.77,19.81,10.84,18.7,19.06,11.6]

// OLS closed-form
const n = rawX.length;
const xbar = rawX.reduce((a,b)=>a+b,0)/n;
const ybar = rawY.reduce((a,b)=>a+b,0)/n;
let num=0, den=0;
for(let i=0;i<n;i++){ num+=(rawX[i]-xbar)*(rawY[i]-ybar); den+=(rawX[i]-xbar)**2; }
const olsSlope = num/den;
const olsIntercept = ybar - olsSlope*xbar;
let olsRSS = 0;
for(let i=0;i<n;i++){ olsRSS += (rawY[i]-(olsIntercept+olsSlope*rawX[i]))**2; }
document.getElementById('olsRssVal').textContent = (olsRSS/n).toFixed(2);

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const xMin = 0, xMax = 320, yMin = 0, yMax = 30;

function resize() {
  const totalH = window.innerHeight;
  const totalW = document.querySelector('.chart-area').getBoundingClientRect().width;
  const w = totalW;
  const h = totalH;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function draw(){
  const W = canvas.width / (window.devicePixelRatio||1);
  const H = canvas.height / (window.devicePixelRatio||1);
  const pad = {l:56, r:14, t:12, b:42};
  const pw = W-pad.l-pad.r, ph = H-pad.t-pad.b;
  
  function sx(x){ return pad.l + (x-xMin)/(xMax-xMin)*pw; }
  function sy(y){ return pad.t + (1-(y-yMin)/(yMax-yMin))*ph; }

  const slope = parseFloat(document.getElementById('slopeSlider').value);
  const intercept = parseFloat(document.getElementById('interceptSlider').value);
  document.getElementById('slopeVal').textContent = slope.toFixed(3);
  document.getElementById('interceptVal').textContent = intercept.toFixed(1);

  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle='#f0f0f0'; ctx.lineWidth=1;
  for(let x=0;x<=300;x+=50){ ctx.beginPath(); ctx.moveTo(sx(x),pad.t); ctx.lineTo(sx(x),H-pad.b); ctx.stroke(); }
  for(let y=0;y<=25;y+=5){ ctx.beginPath(); ctx.moveTo(pad.l,sy(y)); ctx.lineTo(W-pad.r,sy(y)); ctx.stroke(); }

  // Axes
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad.l,H-pad.b); ctx.lineTo(W-pad.r,H-pad.b); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,H-pad.b); ctx.stroke();
  ctx.fillStyle='#888'; ctx.font='16px sans-serif'; ctx.textAlign='center';
  for(let x=0;x<=300;x+=50) ctx.fillText(x, sx(x), H-pad.b+22);
  ctx.textAlign='right';
  for(let y=0;y<=25;y+=5) ctx.fillText(y, pad.l-10, sy(y)+5);
  ctx.fillStyle='#444'; ctx.font='bold 20px sans-serif';
  ctx.textAlign='center'; ctx.fillText('TV', W/2, H-2);
  ctx.save(); ctx.translate(16, H/2); ctx.rotate(-Math.PI/2); ctx.fillText('Sales',0,0); ctx.restore();

  // Regression line
  ctx.strokeStyle='#0063a7'; ctx.lineWidth=3.5;
  ctx.beginPath();
  ctx.moveTo(sx(xMin), sy(intercept+slope*xMin));
  ctx.lineTo(sx(xMax), sy(intercept+slope*xMax));
  ctx.stroke();

  // Residuals — vertical dashed lines only
  let rss = 0;
  let sumE = 0;
  for(let i=0;i<n;i++){
    const yhat = intercept + slope*rawX[i];
    const ei = rawY[i]-yhat;
    rss += ei*ei;
    sumE += ei;

    ctx.strokeStyle='rgba(148,27,34,0.55)'; ctx.lineWidth=2.5;
    ctx.setLineDash([5,4]);
    ctx.beginPath();
    ctx.moveTo(sx(rawX[i]), sy(rawY[i]));
    ctx.lineTo(sx(rawX[i]), sy(yhat));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Data points on top
  for(let i=0;i<n;i++){
    ctx.beginPath(); ctx.arc(sx(rawX[i]), sy(rawY[i]), 8, 0, 2*Math.PI);
    ctx.fillStyle='#0063a7'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  }

  document.getElementById('rssVal').textContent = (rss/n).toFixed(2);
  const me = sumE / n;
  document.getElementById('meVal').textContent = me.toFixed(3);
  const rssEl = document.getElementById('rssVal');
  const ratio = rss / olsRSS;
  if(ratio < 1.05) rssEl.style.color = '#2e7d32';
  else if(ratio < 2) rssEl.style.color = '#e65100';
  else rssEl.style.color = '#941b22';
}

document.getElementById('slopeSlider').addEventListener('input', draw);
document.getElementById('interceptSlider').addEventListener('input', draw);
document.getElementById('showOLS').addEventListener('click', function(){
  document.getElementById('slopeSlider').value = olsSlope;
  document.getElementById('interceptSlider').value = olsIntercept;
  draw();
});

window.addEventListener('resize', resize);
setTimeout(resize, 50);
</script>
</body>
</html>
