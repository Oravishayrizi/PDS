<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; display: flex; justify-content: center; padding: 6px 8px; }
  .container { width: 100%; max-width: 1000px; }
  .slider-row { display: flex; align-items: center; gap: 10px; margin: 0 0 6px; justify-content: center; }
  .slider-row label { font-size: 13px; font-weight: 600; color: #333; }
  .slider-row input[type="range"] { width: 300px; accent-color: #555; cursor: pointer; }
  .slider-row .tval { font-size: 14px; font-weight: 700; color: #333; min-width: 36px; }
  .section-title { font-size: 11px; font-weight: 700; color: #555; margin-bottom: 4px; text-align: center; letter-spacing: 0.04em; text-transform: uppercase; }
  .top-row { display: flex; gap: 12px; margin-bottom: 8px; }
  .top-col { flex: 1; display: flex; flex-direction: column; }
  canvas { display: block; border: 1px solid #ddd; border-radius: 4px; width: 100%; }
  table.cm { width: 100%; border-collapse: separate; border-spacing: 3px; table-layout: fixed; }
  table.cm td { text-align: center; vertical-align: middle; padding: 2px; font-size: 10px; }
  table.cm .col-header { font-weight: 700; font-size: 10px; color: #555; }
  table.cm .row-header { font-weight: 700; font-size: 10px; color: #555; }
  table.cm .cell { border-radius: 4px; }
  table.cm .tn { background: rgba(46,139,87,0.10); }
  table.cm .fn { background: rgba(148,27,34,0.10); }
  table.cm .fp { background: rgba(148,27,34,0.10); }
  table.cm .tp { background: rgba(46,139,87,0.10); }
  .cell-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px 2px; }
  .cell-label { font-size: 8px; font-weight: 700; letter-spacing: 0.06em; opacity: 0.5; }
  .cell-value { font-size: 15px; font-weight: 700; line-height: 1.1; }
  .tn .cell-label, .tn .cell-value { color: #2e8b57; }
  .fn .cell-label, .fn .cell-value { color: #941b22; }
  .fp .cell-label, .fp .cell-value { color: #941b22; }
  .tp .cell-label, .tp .cell-value { color: #2e8b57; }
  table.cm .total { font-size: 10px; color: #aaa; font-style: italic; }
  table.cm .grand { font-size: 10px; color: #888; font-weight: 700; font-style: italic; }
  .bottom-row { display: flex; gap: 8px; }
  .stat-box { flex: 1; background: #f7f7f7; border-radius: 6px; padding: 7px 6px; text-align: center; }
  .stat-acronym { font-size: 15px; font-weight: 800; }
  .stat-long    { font-size: 9px; color: #777; margin-top: 1px; }
  .stat-calc    { font-size: 9px; color: #aaa; font-style: italic; margin-top: 4px; line-height: 1.3; }
  .stat-value   { font-size: 20px; font-weight: 700; margin-top: 3px; }
  .stat-box.tpr .stat-acronym, .stat-box.tpr .stat-value { color: #0063a7; }
  .stat-box.fpr .stat-acronym, .stat-box.fpr .stat-value { color: #941b22; }
  .stat-box.ppv .stat-acronym, .stat-box.ppv .stat-value { color: #e07b00; }
  .stat-box.acc .stat-acronym, .stat-box.acc .stat-value { color: #444; }
  .stat-box .stat-formula { font-size: 9px;  color: #aaa; font-style: italic; margin-top: 1px; }
  #loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div id="loading">Loading data...</div>
  <div id="app" style="display:none">
    <div class="slider-row">
      <label>Threshold <em>t</em>:</label>
      <input type="range" id="threshold" min="0.0" max="1" step="0.005" value="0.5">
      <span class="tval" id="tval">0.50</span>
    </div>
    <div class="top-row">
      <div class="top-col">
        <div class="section-title">Predicted probabilities</div>
        <canvas id="histCanvas" width="300" height="210"></canvas>
      </div>
      <div class="top-col">
        <div class="section-title">ROC curve</div>
        <canvas id="rocCanvas" width="300" height="210"></canvas>
      </div>
      <div class="top-col">
        <div class="section-title">Confusion matrix</div>
        <table class="cm">
          <colgroup>
            <col style="width:13%"><col style="width:13%">
            <col style="width:26%"><col style="width:26%"><col style="width:22%">
          </colgroup>
          <tr><td></td><td></td><td class="col-header" colspan="2">Actual</td><td></td></tr>
          <tr><td></td><td></td><td class="col-header">No</td><td class="col-header">Yes</td><td class="col-header">Total</td></tr>
          <tr>
            <td class="row-header" rowspan="2" style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:9px;font-weight:700;color:#555;vertical-align:middle;">Predicted</td>
            <td class="row-header">No</td>
            <td class="cell tn"><div class="cell-inner"><span class="cell-label">TN</span><span class="cell-value" id="tn_v">—</span></div></td>
            <td class="cell fn"><div class="cell-inner"><span class="cell-label">FN</span><span class="cell-value" id="fn_v">—</span></div></td>
            <td class="total" id="tot_pred_no">—</td>
          </tr>
          <tr>
            <td class="row-header">Yes</td>
            <td class="cell fp"><div class="cell-inner"><span class="cell-label">FP</span><span class="cell-value" id="fp_v">—</span></div></td>
            <td class="cell tp"><div class="cell-inner"><span class="cell-label">TP</span><span class="cell-value" id="tp_v">—</span></div></td>
            <td class="total" id="tot_pred_yes">—</td>
          </tr>
          <tr><td></td><td class="col-header">Total</td><td class="total" id="tot_act_no">—</td><td class="total" id="tot_act_yes">—</td><td class="grand" id="grand">—</td></tr>
        </table>
      </div>
    </div>
    <div class="bottom-row">
      <div class="stat-box tpr"><div class="stat-acronym">TPR</div><div class="stat-long">Sensitivity / Recall</div> <div class="stat-formula">TP / (TP+FN)</div><div class="stat-calc" id="c_tpr">—</div><div class="stat-value" id="s_tpr">—</div></div>
      <div class="stat-box fpr"><div class="stat-acronym">FPR</div><div class="stat-long">1 − Specificity</div><div class="stat-formula">FP / (FP+TN)</div><div class="stat-calc" id="c_fpr">—</div><div class="stat-value" id="s_fpr">—</div></div>
      <div class="stat-box ppv"><div class="stat-acronym">PPV</div><div class="stat-long">Precision</div><div class="stat-formula">FP / (FP+TN)</div><div class="stat-calc" id="c_ppv">—</div><div class="stat-value" id="s_ppv">—</div></div>
      <div class="stat-box acc"><div class="stat-acronym">ACC</div><div class="stat-long">Accuracy</div><div class="stat-formula">(TP+TN) / N</div><div class="stat-calc" id="c_acc">—</div><div class="stat-value" id="s_acc">—</div></div>
    </div>
  </div>
</div>

 0, 0, 0, 0, 0];
const N = probs.length;
document.getElementById('loading').style.display = 'none';
document.getElementById('app').style.display = 'block';

    const ROC_N=300, rocPts=[];
    for (let k=0;k<=ROC_N;k++) {
      const t=k/ROC_N; let tn=0,fp=0,fn=0,tp=0;
      for (let i=0;i<N;i++) {
        const pred=probs[i]>=t?1:0;
        if (pred===0&&labels[i]===0) tn++;
        else if (pred===1&&labels[i]===0) fp++;
        else if (pred===0&&labels[i]===1) fn++;
        else tp++;
      }
      rocPts.push({fpr:(tn+fp)>0?fp/(tn+fp):0,tpr:(fn+tp)>0?tp/(fn+tp):0,t});
    }

    const hCv=document.getElementById('histCanvas'),hCtx=hCv.getContext('2d');
    const hW=hCv.width,hH=hCv.height,hM={top:18,right:14,bottom:32,left:36};
    const hPW=hW-hM.left-hM.right,hPH=hH-hM.top-hM.bottom,BINS=25;
    const b0=new Array(BINS).fill(0),b1=new Array(BINS).fill(0);
    for (let i=0;i<N;i++) { const b=Math.min(BINS-1,Math.floor(probs[i]*BINS)); if(labels[i]===0) b0[b]++; else b1[b]++; }
    const maxC=Math.max(...b0.map((v,i)=>v+b1[i]));
    const htoX=p=>hM.left+p*hPW, htoY=n=>hM.top+(1-n/maxC)*hPH;

    function drawHist(t) {
      hCtx.clearRect(0,0,hW,hH); hCtx.fillStyle='#fff'; hCtx.fillRect(0,0,hW,hH);
      const bw=hPW/BINS;
      hCtx.strokeStyle='#eee'; hCtx.lineWidth=1;
      for (let y=0;y<=maxC;y+=Math.ceil(maxC/4)) { hCtx.beginPath(); hCtx.moveTo(hM.left,htoY(y)); hCtx.lineTo(hW-hM.right,htoY(y)); hCtx.stroke(); }
      for (let b=0;b<BINS;b++) {
        const x0=hM.left+b*bw+1,w=bw-2,n0=b0[b],n1=b1[b],tot=n0+n1,yBase=hM.top+hPH;
        hCtx.fillStyle='rgba(148,27,34,0.6)'; hCtx.fillRect(x0,htoY(tot),w,htoY(tot-n1)-htoY(tot));
        hCtx.fillStyle='rgba(0,99,167,0.5)'; hCtx.fillRect(x0,htoY(n0),w,yBase-htoY(n0));
      }
      const tpx=htoX(t);
      hCtx.strokeStyle='#222'; hCtx.lineWidth=2; hCtx.setLineDash([5,4]);
      hCtx.beginPath(); hCtx.moveTo(tpx,hM.top); hCtx.lineTo(tpx,hM.top+hPH); hCtx.stroke(); hCtx.setLineDash([]);
      hCtx.fillStyle='#222'; hCtx.font='bold 9px sans-serif'; hCtx.textAlign='center';
      if(t>0.18) hCtx.fillText('← No',tpx-20,hM.top+10);
      if(t<0.82) hCtx.fillText('Yes →',tpx+20,hM.top+10);
      hCtx.strokeStyle='#333'; hCtx.lineWidth=1.5;
      hCtx.beginPath(); hCtx.moveTo(hM.left,hM.top); hCtx.lineTo(hM.left,hM.top+hPH); hCtx.lineTo(hW-hM.right,hM.top+hPH); hCtx.stroke();
      hCtx.fillStyle='#555'; hCtx.font='9px sans-serif'; hCtx.textAlign='center';
      for(let p=0;p<=1;p+=0.2) hCtx.fillText(p.toFixed(1),htoX(p),hM.top+hPH+12);
      hCtx.fillText('Predicted probability',hW/2,hH-1);
      hCtx.save(); hCtx.translate(9,hM.top+hPH/2); hCtx.rotate(-Math.PI/2); hCtx.textAlign='center'; hCtx.fillText('Count',0,0); hCtx.restore();
      const lx=hW-hM.right-84,ly=hM.top+3;
      hCtx.font='9px sans-serif'; hCtx.textAlign='left';
      hCtx.fillStyle='rgba(148,27,34,0.6)'; hCtx.fillRect(lx,ly,9,8); hCtx.fillStyle='#333'; hCtx.fillText('Y=1 (default)',lx+12,ly+7);
      hCtx.fillStyle='rgba(0,99,167,0.5)'; hCtx.fillRect(lx,ly+12,9,8); hCtx.fillStyle='#333'; hCtx.fillText('Y=0 (no default)',lx+12,ly+19);
    }

    const rCv=document.getElementById('rocCanvas'),rCtx=rCv.getContext('2d');
    const rW=rCv.width,rH=rCv.height,rM={top:18,right:14,bottom:32,left:38};
    const rPW=rW-rM.left-rM.right,rPH=rH-rM.top-rM.bottom;
    const toRX=fpr=>rM.left+fpr*rPW, toRY=tpr=>rM.top+(1-tpr)*rPH;

    function drawROC(t) {
      rCtx.clearRect(0,0,rW,rH); rCtx.fillStyle='#fff'; rCtx.fillRect(0,0,rW,rH);
      rCtx.strokeStyle='#eee'; rCtx.lineWidth=1;
      for(let v=0;v<=1;v+=0.25) {
        rCtx.beginPath(); rCtx.moveTo(rM.left,toRY(v)); rCtx.lineTo(rW-rM.right,toRY(v)); rCtx.stroke();
        rCtx.beginPath(); rCtx.moveTo(toRX(v),rM.top); rCtx.lineTo(toRX(v),rM.top+rPH); rCtx.stroke();
      }
      rCtx.strokeStyle='#ccc'; rCtx.lineWidth=1.2; rCtx.setLineDash([4,4]);
      rCtx.beginPath(); rCtx.moveTo(toRX(0),toRY(0)); rCtx.lineTo(toRX(1),toRY(1)); rCtx.stroke(); rCtx.setLineDash([]);
      rCtx.fillStyle='#bbb'; rCtx.font='italic 8px sans-serif'; rCtx.textAlign='left';
      rCtx.fillText('random classifier',toRX(0.38),toRY(0.32));
      rCtx.fillText('(TPR = FPR)',toRX(0.40),toRY(0.24));
      rCtx.strokeStyle='#0063a7'; rCtx.lineWidth=2.5;
      rCtx.beginPath();
      rocPts.forEach((p,i)=>{ if(i===0) rCtx.moveTo(toRX(p.fpr),toRY(p.tpr)); else rCtx.lineTo(toRX(p.fpr),toRY(p.tpr)); });
      rCtx.stroke();
      let best=rocPts[0],bestD=Infinity;
      rocPts.forEach(p=>{ const d=Math.abs(p.t-t); if(d<bestD){bestD=d;best=p;} });
      rCtx.strokeStyle='rgba(0,0,0,0.15)'; rCtx.lineWidth=1; rCtx.setLineDash([3,3]);
      rCtx.beginPath(); rCtx.moveTo(toRX(best.fpr),toRY(best.tpr)); rCtx.lineTo(toRX(best.fpr),rM.top+rPH); rCtx.stroke();
      rCtx.beginPath(); rCtx.moveTo(toRX(best.fpr),toRY(best.tpr)); rCtx.lineTo(rM.left,toRY(best.tpr)); rCtx.stroke();
      rCtx.setLineDash([]);
      rCtx.beginPath(); rCtx.arc(toRX(best.fpr),toRY(best.tpr),6,0,Math.PI*2);
      rCtx.fillStyle='#941b22'; rCtx.fill(); rCtx.strokeStyle='#fff'; rCtx.lineWidth=2; rCtx.stroke();
      rCtx.strokeStyle='#333'; rCtx.lineWidth=1.5;
      rCtx.beginPath(); rCtx.moveTo(rM.left,rM.top); rCtx.lineTo(rM.left,rM.top+rPH); rCtx.lineTo(rW-rM.right,rM.top+rPH); rCtx.stroke();
      rCtx.fillStyle='#555'; rCtx.font='9px sans-serif'; rCtx.textAlign='center';
      for(let v=0;v<=1;v+=0.25) rCtx.fillText(v.toFixed(2),toRX(v),rM.top+rPH+12);
      rCtx.fillText('FPR',rW/2,rH-1);
      rCtx.textAlign='right';
      for(let v=0;v<=1;v+=0.25) rCtx.fillText(v.toFixed(2),rM.left-3,toRY(v)+3);
      rCtx.save(); rCtx.translate(9,rM.top+rPH/2); rCtx.rotate(-Math.PI/2); rCtx.textAlign='center'; rCtx.fillText('TPR',0,0); rCtx.restore();
    }

    function fmt(n){ return n.toLocaleString(); }
    function pct(n){ return (n*100).toFixed(1)+'%'; }

    function updateCM(t) {
      let tn=0,fp=0,fn=0,tp=0;
      for(let i=0;i<N;i++) {
        const pred=probs[i]>=t?1:0;
        if(pred===0&&labels[i]===0) tn++;
        else if(pred===1&&labels[i]===0) fp++;
        else if(pred===0&&labels[i]===1) fn++;
        else tp++;
      }
      document.getElementById('tn_v').textContent=fmt(tn);
      document.getElementById('fn_v').textContent=fmt(fn);
      document.getElementById('fp_v').textContent=fmt(fp);
      document.getElementById('tp_v').textContent=fmt(tp);
      document.getElementById('tot_pred_no').textContent=fmt(tn+fn);
      document.getElementById('tot_pred_yes').textContent=fmt(fp+tp);
      document.getElementById('tot_act_no').textContent=fmt(tn+fp);
      document.getElementById('tot_act_yes').textContent=fmt(fn+tp);
      document.getElementById('grand').textContent=fmt(N);
      const tprV=(fn+tp)>0?tp/(fn+tp):1, fprV=(tn+fp)>0?fp/(tn+fp):0;
      const ppvV=(fp+tp)>0?tp/(fp+tp):0, accV=(tn+tp)/N;
      document.getElementById('s_tpr').textContent=pct(tprV);
      document.getElementById('s_fpr').textContent=pct(fprV);
      document.getElementById('s_ppv').textContent=pct(ppvV);
      document.getElementById('s_acc').textContent=pct(accV);
      document.getElementById('c_tpr').textContent=`${fmt(tp)} / (${fmt(tp)}+${fmt(fn)})`;
      document.getElementById('c_fpr').textContent=`${fmt(fp)} / (${fmt(fp)}+${fmt(tn)})`;
      document.getElementById('c_ppv').textContent=`${fmt(tp)} / (${fmt(tp)}+${fmt(fp)})`;
      document.getElementById('c_acc').textContent=`(${fmt(tp)}+${fmt(tn)}) / ${fmt(N)}`;
    }

    function update() {
      const t=parseFloat(document.getElementById('threshold').value);
      document.getElementById('tval').textContent=t.toFixed(2);
      drawHist(t); drawROC(t); updateCM(t);
    }
    document.getElementById('threshold').addEventListener('input',update);
    update();
</script>
</body>
