<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; display: flex; justify-content: center; padding: 8px; }
  .container { width: 100%; max-width: 960px; }
  .panels { display: flex; gap: 16px; }
  .panel { flex: 1; }
  .panel-title { text-align: center; font-size: 15px; font-weight: 700; margin-bottom: 6px; padding: 5px 0; border-radius: 4px; }
  .panel-title.lpm { background: #f8eaeb; color: #941b22; }
  .panel-title.logit { background: #e8f0f7; color: #0063a7; }
  canvas { display: block; border: 1px solid #ddd; border-radius: 4px; width: 100%; }
  .controls { display: flex; gap: 16px; justify-content: center; margin-top: 8px; align-items: center; }
  .control-group { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .control-group label { font-size: 11px; color: #555; font-weight: 500; }
  .control-group .value { font-size: 12px; font-weight: 700; min-width: 40px; text-align: center; }
  .value.lpm { color: #941b22; }
  .value.logit { color: #0063a7; }
  input[type="range"] { width: 140px; cursor: pointer; }
  input[type="range"].lpm { accent-color: #941b22; }
  input[type="range"].logit { accent-color: #0063a7; }
  .btn-row { text-align: center; margin-top: 6px; }
  .btn-solution { font-size: 12px; padding: 4px 14px; border-radius: 4px; border: 1.5px solid; cursor: pointer; background: #fff; font-weight: 600; }
  .btn-solution.lpm { color: #941b22; border-color: #941b22; }
  .btn-solution.logit { color: #0063a7; border-color: #0063a7; }
  .btn-solution:hover { filter: brightness(0.9); }
  .info-row { text-align: center; margin-top: 4px; font-size: 11px; color: #666; }
  .info-row .formula { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-style: normal; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="panels">
    <!-- LPM panel -->
    <div class="panel">
      <div class="panel-title lpm">Linear Probability Model (LPM)</div>
      <canvas id="canvas_lpm" width="460" height="380"></canvas>
      <div class="controls">
        <div class="control-group">
          <label>Intercept (β₀)</label>
          <input type="range" class="lpm" id="lpm_b0" min="-1" max="1" step="0.02" value="0">
          <div class="value lpm" id="lpm_b0val">0.00</div>
        </div>
        <div class="control-group">
          <label>Slope (β₁)</label>
          <input type="range" class="lpm" id="lpm_b1" min="-0.5" max="0.5" step="0.01" value="0.15">
          <div class="value lpm" id="lpm_b1val">0.15</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-solution lpm" id="btn_lpm">Show OLS Solution</button>
      </div>
      <div class="info-row">
        <span class="formula">p&#x0302;(X) &nbsp;=&nbsp; &beta;&sub;&#x2080; + &beta;&sub;&#x2081; &middot; X</span>
      </div>
    </div>

    <!-- Logistic panel -->
    <div class="panel">
      <div class="panel-title logit">Logistic Regression</div>
      <canvas id="canvas_logit" width="460" height="380"></canvas>
      <div class="controls">
        <div class="control-group">
          <label>Intercept (β₀)</label>
          <input type="range" class="logit" id="logit_b0" min="-6" max="2" step="0.1" value="0">
          <div class="value logit" id="logit_b0val">0.0</div>
        </div>
        <div class="control-group">
          <label>Slope (β₁)</label>
          <input type="range" class="logit" id="logit_b1" min="-2" max="8" step="0.1" value="1.5">
          <div class="value logit" id="logit_b1val">1.5</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-solution logit" id="btn_logit">Show Logit Solution</button>
      </div>
      <div class="info-row">
        <span class="formula">p&#x0302;(X) &nbsp;=&nbsp; e<sup>&beta;&sub;&#x2080;+&beta;&sub;&#x2081;X</sup> / (1 + e<sup>&beta;&sub;&#x2080;+&beta;&sub;&#x2081;X</sup>)</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── Simple LCG for reproducible random numbers ──
function lcg(seed) {
  let s = seed | 0;
  return function() {
    s = Math.imul(s, 1664525) + 1013904223 | 0;
    return (s >>> 0) / 4294967296;
  };
}

// ── Generate shared data ──
const rng = lcg(42);
const N = 80;
const dataX = [], dataY = [];
for (let i = 0; i < N; i++) {
  const x = (rng() - 0.5) * 8;
  const trueP = 1 / (1 + Math.exp(-(0.3 + 1.2 * x)));
  const y = rng() < trueP ? 1 : 0;
  dataX.push(x);
  dataY.push(y);
}

// ── Compute OLS solution (closed-form) ──
let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
for (let i = 0; i < N; i++) {
  sumX += dataX[i]; sumY += dataY[i];
  sumXY += dataX[i] * dataY[i]; sumXX += dataX[i] * dataX[i];
}
const xBar = sumX / N, yBar = sumY / N;
const olsB1 = (sumXY - N * xBar * yBar) / (sumXX - N * xBar * xBar);
const olsB0 = yBar - olsB1 * xBar;

// ── Compute Logit solution (Newton-Raphson) ──
function fitLogit(xs, ys, maxIter) {
  let b0 = 0, b1 = 0;
  for (let iter = 0; iter < (maxIter || 50); iter++) {
    let g0 = 0, g1 = 0, h00 = 0, h01 = 0, h11 = 0;
    for (let i = 0; i < xs.length; i++) {
      const p = 1 / (1 + Math.exp(-(b0 + b1 * xs[i])));
      const r = ys[i] - p;
      g0 += r; g1 += r * xs[i];
      const w = p * (1 - p);
      h00 += w; h01 += w * xs[i]; h11 += w * xs[i] * xs[i];
    }
    const det = h00 * h11 - h01 * h01;
    if (Math.abs(det) < 1e-12) break;
    b0 += (h11 * g0 - h01 * g1) / det;
    b1 += (h00 * g1 - h01 * g0) / det;
  }
  return { b0, b1 };
}
const logitSol = fitLogit(dataX, dataY);

// ── Drawing ──
const xMin = -5, xMax = 5;
const margin = { top: 20, right: 20, bottom: 38, left: 45 };

function drawPanel(canvasId, b0, b1, mode) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pw = W - margin.left - margin.right;
  const ph = H - margin.top - margin.bottom;

  const yMin = mode === 'lpm' ? -0.35 : -0.1;
  const yMax = mode === 'lpm' ? 1.35 : 1.1;

  function toX(x) { return margin.left + (x - xMin) / (xMax - xMin) * pw; }
  function toY(y) { return margin.top + (1 - (y - yMin) / (yMax - yMin)) * ph; }

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  // Grid at y=0, 0.25, 0.5, 0.75, 1
  ctx.strokeStyle = '#eee';
  ctx.lineWidth = 1;
  for (let y = 0; y <= 1; y += 0.25) {
    ctx.beginPath(); ctx.moveTo(margin.left, toY(y)); ctx.lineTo(W - margin.right, toY(y)); ctx.stroke();
  }

  // y=0 and y=1 reference
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(margin.left, toY(0)); ctx.lineTo(W - margin.right, toY(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(margin.left, toY(1)); ctx.lineTo(W - margin.right, toY(1)); ctx.stroke();
  ctx.setLineDash([]);

  // Shade problem regions for LPM
  if (mode === 'lpm') {
    const y0px = toY(0), y1px = toY(1);
    const topPx = margin.top, botPx = H - margin.bottom;
    ctx.fillStyle = 'rgba(148, 27, 34, 0.06)';
    if (y0px < botPx) ctx.fillRect(margin.left, y0px, pw, botPx - y0px);
    if (y1px > topPx) ctx.fillRect(margin.left, topPx, pw, y1px - topPx);
  }

  // Curve / line
  const color = mode === 'lpm' ? '#941b22' : '#0063a7';
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  const steps = 300;
  for (let i = 0; i <= steps; i++) {
    const x = xMin + (xMax - xMin) * i / steps;
    let y;
    if (mode === 'lpm') {
      y = b0 + b1 * x;
    } else {
      y = 1 / (1 + Math.exp(-(b0 + b1 * x)));
    }
    const px = toX(x), py = toY(y);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();

  // Data points
  const jRng = lcg(99);
  for (let i = 0; i < N; i++) {
    const jitter = (jRng() - 0.5) * 0.06;
    const px = toX(dataX[i]);
    const py = toY(dataY[i] + jitter);
    ctx.beginPath();
    ctx.arc(px, py, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = dataY[i] === 1 ? 'rgba(0, 99, 167, 0.55)' : 'rgba(148, 27, 34, 0.45)';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, H - margin.bottom);
  ctx.lineTo(W - margin.right, H - margin.bottom);
  ctx.stroke();

  // X labels
  ctx.fillStyle = '#333';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  for (let x = -4; x <= 4; x += 2) {
    ctx.fillText(x.toString(), toX(x), H - margin.bottom + 15);
  }
  ctx.font = '12px -apple-system, sans-serif';
  ctx.fillText('X', W / 2, H - 4);

  // Y labels
  ctx.textAlign = 'right';
  ctx.font = '11px -apple-system, sans-serif';
  for (let y = 0; y <= 1; y += 0.25) {
    ctx.fillText(y.toFixed(2), margin.left - 6, toY(y) + 4);
  }
  if (mode === 'lpm') {
    for (const y of [-0.25, 1.25]) {
      if (y >= yMin && y <= yMax) {
        ctx.fillStyle = '#941b22';
        ctx.fillText(y.toFixed(2), margin.left - 6, toY(y) + 4);
        ctx.fillStyle = '#333';
      }
    }
  }

  // Y axis label
  ctx.save();
  ctx.translate(12, H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.font = '12px -apple-system, sans-serif';
  ctx.fillStyle = '#333';
  ctx.fillText('p\u0302(X)', 0, 0);
  ctx.restore();

  // MSE display
  let mse = 0;
  for (let i = 0; i < N; i++) {
    let pred;
    if (mode === 'lpm') {
      pred = b0 + b1 * dataX[i];
    } else {
      pred = 1 / (1 + Math.exp(-(b0 + b1 * dataX[i])));
    }
    mse += (dataY[i] - pred) ** 2;
  }
  mse /= N;
  ctx.fillStyle = color;
  ctx.font = 'bold 12px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('MSE = ' + mse.toFixed(4), margin.left + 8, margin.top + 14);

  // Point legend
  const lx = W - margin.right - 80, ly = margin.top + 6;
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.beginPath(); ctx.arc(lx, ly + 2, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0, 99, 167, 0.55)'; ctx.fill();
  ctx.fillStyle = '#333'; ctx.fillText('Y = 1', lx + 8, ly + 6);
  ctx.beginPath(); ctx.arc(lx, ly + 17, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(148, 27, 34, 0.45)'; ctx.fill();
  ctx.fillStyle = '#333'; ctx.fillText('Y = 0', lx + 8, ly + 21);
}

// ── Wire up controls ──
function updateLPM() {
  const b0 = parseFloat(document.getElementById('lpm_b0').value);
  const b1 = parseFloat(document.getElementById('lpm_b1').value);
  document.getElementById('lpm_b0val').textContent = b0.toFixed(2);
  document.getElementById('lpm_b1val').textContent = b1.toFixed(2);
  drawPanel('canvas_lpm', b0, b1, 'lpm');
}

function updateLogit() {
  const b0 = parseFloat(document.getElementById('logit_b0').value);
  const b1 = parseFloat(document.getElementById('logit_b1').value);
  document.getElementById('logit_b0val').textContent = b0.toFixed(1);
  document.getElementById('logit_b1val').textContent = b1.toFixed(1);
  drawPanel('canvas_logit', b0, b1, 'logit');
}

document.getElementById('lpm_b0').addEventListener('input', updateLPM);
document.getElementById('lpm_b1').addEventListener('input', updateLPM);
document.getElementById('logit_b0').addEventListener('input', updateLogit);
document.getElementById('logit_b1').addEventListener('input', updateLogit);

// Solution buttons — animate sliders to fitted values
function animateTo(sliderId, target, updateFn, duration) {
  const slider = document.getElementById(sliderId);
  const start = parseFloat(slider.value);
  const startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // ease in-out
    slider.value = start + (target - start) * ease;
    updateFn();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

document.getElementById('btn_lpm').addEventListener('click', function() {
  const b0Target = Math.round(olsB0 * 50) / 50;
  const b1Target = Math.round(olsB1 * 100) / 100;
  animateTo('lpm_b0', b0Target, updateLPM, 600);
  animateTo('lpm_b1', b1Target, updateLPM, 600);
});

document.getElementById('btn_logit').addEventListener('click', function() {
  const b0Target = Math.round(logitSol.b0 * 10) / 10;
  const b1Target = Math.round(logitSol.b1 * 10) / 10;
  animateTo('logit_b0', b0Target, updateLogit, 600);
  animateTo('logit_b1', b1Target, updateLogit, 600);
});

// Initial draw
updateLPM();
updateLogit();
</script>
</body>
</html>
